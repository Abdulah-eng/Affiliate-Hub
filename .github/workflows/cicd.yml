name: CI/CD Pipeline

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  build_and_test:
    name: Build & Validations
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm install

      - name: Generate Prisma Client
        run: npx prisma generate

      - name: Type Check
        run: npx tsc --noEmit

      - name: Lint Code
        run: |
          # Only fail if eslint is set up to fail on warnings, 
          # otherwise this will just catch syntax errors and standard lints.
          npm run lint



  deploy:
    name: Deploy to Hostinger VPS
    needs: build_and_test
    # Only deploy when pushing to the main branch
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'
    runs-on: ubuntu-latest

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.HOSTINGER_VPS_IP }}
          username: ${{ secrets.HOSTINGER_VPS_USERNAME }}
          password: ${{ secrets.HOSTINGER_VPS_PASSWORD }}
          port: ${{ secrets.HOSTINGER_VPS_PORT || 22 }}
          timeout: 60s
          command_timeout: 10m
          script: |
            # Navigate to your project directory. Change this to the actual path on your VPS (e.g. /var/www/Affiliate-Hub)
            cd /root/Affiliate-Hub
            
            # Pull latest changes from git
            git pull origin main
            
            # Install dependencies
            npm install
            
            # Sync database schema
            npx prisma db push --accept-data-loss
            
            # Generate Prisma Client
            npx prisma generate
            
            # Create uploads directory for CMS if it doesn't exist
            mkdir -p public/uploads/cms
            
            # Build the Next.js application
            npm run build
            
            # Start or restart the application with PM2
            pm2 startOrRestart ecosystem.config.js --env production
            
            # Save the PM2 list to resume on server reboot
            pm2 save

